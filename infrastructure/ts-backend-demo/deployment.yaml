apiVersion: apps/v1
kind: Deployment
metadata:
  name: ts-backend-demo
  labels:
    app.kubernetes.io/name: ts-backend-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: ts-backend-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ts-backend-demo
    spec:
      containers:
        - name: ts-backend-demo
          image: ghcr.io/rubenspensky-homelab/ts-backend-demo:ed4738cad8d17e157471b507bcb75d18b2100fd7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ts-backend-demo-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
