apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-qwen2-5-3b-instruct-q4-k-m
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: ollama
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: model-pull
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: k8s-control-01
        accelerator: nvidia
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: ollama-pull
          image: ollama/ollama:0.12.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              ollama serve &
              until ollama list >/dev/null 2>&1; do sleep 2; done
              ollama pull qwen2.5:3b-instruct-q4_K_M
          env:
            - name: OLLAMA_HOST
              value: 127.0.0.1:11434
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
