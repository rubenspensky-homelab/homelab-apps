apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-ui
  namespace: default
  labels:
    app.kubernetes.io/name: ollama-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama-ui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama-ui
    spec:
      containers:
        - name: ollama-ui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama.default.svc.cluster.local:11434
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: ollama-ui-data
              mountPath: /app/backend/data
      volumes:
        - name: ollama-ui-data
          persistentVolumeClaim:
            claimName: ollama-ui-data
