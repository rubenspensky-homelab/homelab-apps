apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ollama-ui
  namespace: default
spec:
  parentRefs:
    - name: homelab-gateway
      namespace: routing
  hostnames:
    - ollama-ui.home.lab
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ollama-ui
          port: 80
