apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: routing
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/rubenspensky-homelab/homelab-apps.git
    targetRevision: main
    path: infrastructure/ts-backend-demo

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
